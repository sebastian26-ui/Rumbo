<!doctype html>
<html lang="es-CL">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0F172A" />
    <title>Rumbo — Sin conexión</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #0F172A;
        color: #E5E7EB;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, system-ui, sans-serif;
      }
      main {
        min-height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 24px;
      }
      .icon {
        width: 72px;
        height: 72px;
        border-radius: 20px;
        background: #1E293B;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 24px;
        font-size: 32px;
        color: #00C896;
        font-weight: 900;
      }
      h1 { font-size: 24px; margin: 0 0 8px; font-weight: 800; color: #fff; }
      p { font-size: 15px; margin: 0 0 24px; color: #94A3B8; max-width: 320px; line-height: 1.5; }
      button {
        background: #00C896;
        color: #0F172A;
        font-weight: 800;
        font-size: 15px;
        border: 0;
        padding: 14px 24px;
        border-radius: 16px;
        cursor: pointer;
      }
      button:active { transform: scale(0.97); }
    </style>
  </head>
  <body>
    <main>
      <div class="icon">R</div>
      <h1>Sin conexión</h1>
      <p>Rumbo necesita internet para planificar rutas. Cuando vuelva la señal, vuelve a intentarlo.</p>
      <button onclick="location.reload()">Reintentar</button>
    </main>
  </body>
</html>
