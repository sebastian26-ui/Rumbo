# Render Blueprint for Rumbo.
#
# Defines:
#   - a single `web` service that builds the Vite frontend and serves both
#     the SPA + Express API from one origin (`/api/*` on the same host
#     means the CORS allowlist only needs the public domain)
#   - a 1 GB persistent disk for the GTFS SQLite cache so the feed
#     survives deploys
#
# GTFS refresh: Render cron jobs can't mount disks, so the weekly refresh
# is run manually for now via the web service's Shell:
#     npm run gtfs:ingest
# Post-launch task: schedule this from inside server.ts using a
# setInterval / node-cron so it runs weekly without manual intervention.
#
# After connecting your GitHub repo to Render, all variables marked
# `sync: false` must be pasted in the Render dashboard manually (they
# never live in git).
services:
  - type: web
    name: rumbo
    runtime: node
    plan: starter
    region: oregon
    rootDir: rumbo
    branch: main
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    healthCheckPath: /health
    autoDeploy: true
    disk:
      name: rumbo-data
      mountPath: /opt/render/project/src/rumbo/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: ROUTING_PROVIDER
        value: graphhopper
      - key: TRANSIT_PROVIDER
        value: gtfs
      - key: GTFS_DB_PATH
        value: /opt/render/project/src/rumbo/data/gtfs.db
      - key: CORS_ALLOWED_ORIGINS
        value: https://rumbo.cl,https://www.rumbo.cl
      - key: GRAPHHOPPER_API_KEY
        sync: false
      - key: GOOGLE_MAPS_API_KEY
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: VITE_SENTRY_DSN
        sync: false
      - key: VITE_RECAPTCHA_SITE_KEY
        sync: false
